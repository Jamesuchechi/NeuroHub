<!doctype html>
<html lang="en" class="h-full">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>NeuroHub - AI Developer Hub</title>
		<script src="https://cdn.tailwindcss.com"></script>
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
			rel="stylesheet"
		/>
		<style>
			* {
				font-family: 'Inter', sans-serif;
			}
			.glass {
				backdrop-filter: blur(24px);
			}
			@keyframes float1 {
				0%,
				100% {
					transform: translateY(0) rotate(0deg);
				}
				50% {
					transform: translateY(-24px) rotate(2deg);
				}
			}
			@keyframes float2 {
				0%,
				100% {
					transform: translateY(0) rotate(0deg);
				}
				50% {
					transform: translateY(-16px) rotate(-1deg);
				}
			}
			@keyframes pulse-glow {
				0%,
				100% {
					box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
				}
				50% {
					box-shadow: 0 0 40px rgba(59, 130, 246, 0.6);
				}
			}
			@keyframes shimmer {
				0% {
					background-position: -200% 0;
				}
				100% {
					background-position: 200% 0;
				}
			}
			.shimmer {
				background: linear-gradient(90deg, #000 0%, #15202b 50%, #000 100%);
				background-size: 200% 100%;
			}
		</style>
	</head>
	<body class="h-full overflow-hidden bg-[#000000] text-white">
		<!-- Floating Particles -->
		<canvas id="particles" class="pointer-events-none fixed inset-0 z-0 opacity-30"></canvas>

		<!-- Main Container -->
		<div
			class="relative z-10 flex min-h-screen items-center justify-center px-4 py-12 sm:px-6 lg:px-8"
		>
			<div class="flex w-full max-w-7xl flex-col items-center gap-16 lg:flex-row lg:gap-24">
				<!-- Enhanced Hero -->
				<div class="text-center lg:w-1/2 lg:pr-12 lg:text-left">
					<div
						class="glass mb-8 inline-flex items-center rounded-2xl border border-[#30363d]/50 bg-[#15202b]/80 px-4 py-2 backdrop-blur-xl"
					>
						<div
							class="shimmer mr-3 h-2.5 w-2.5 rounded-full bg-gradient-to-r from-blue-400 via-purple-400 to-pink-400"
							style="animation: shimmer 3s infinite"
						></div>
						<span class="text-sm font-medium text-[#b0b7bc]">AI Developer Workspace</span>
					</div>

					<h1
						class="mb-6 bg-gradient-to-r from-white via-gray-100 to-gray-300 bg-clip-text text-6xl leading-[0.9] font-black tracking-tight text-transparent lg:text-7xl"
					>
						Neuro<span
							class="bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent"
							>Hub</span
						>
					</h1>

					<div class="glass mb-10 rounded-2xl border border-[#30363d]/50 bg-[#15202b]/50 p-8">
						<p class="mb-6 text-xl leading-relaxed text-[#b0b7bc]">
							Real-time collaboration meets AI copilot. Code, chat, and ship faster with your team.
						</p>
						<div class="grid grid-cols-3 gap-4 text-sm text-[#8b949e]">
							<div class="flex items-center">
								<span class="mr-2 h-2 w-2 rounded-full bg-green-400"></span>Live Chat
							</div>
							<div class="flex items-center">
								<span class="mr-2 h-2 w-2 rounded-full bg-blue-400"></span>AI Assistant
							</div>
							<div class="flex items-center">
								<span class="mr-2 h-2 w-2 rounded-full bg-purple-400"></span>Dev Tools
							</div>
						</div>
					</div>

					<div class="flex flex-col gap-4 sm:flex-row">
						<button
							class="group flex items-center justify-center rounded-2xl bg-white px-10 py-4 text-lg font-bold text-black shadow-2xl transition-all duration-300 hover:-translate-y-1 hover:scale-[1.02] hover:shadow-blue-500/50"
							style="animation: pulse-glow 2s infinite"
						>
							<span>Launch NeuroHub</span>
							<svg
								class="ml-3 h-6 w-6 transition-all group-hover:translate-x-1"
								fill="none"
								stroke="currentColor"
								viewBox="0 0 24 24"
							>
								<path
									stroke-linecap="round"
									stroke-linejoin="round"
									stroke-width="2"
									d="M17 8l4 4m0 0l-4 4m4-4H3"
								></path>
							</svg>
						</button>
						<button
							class="flex items-center justify-center rounded-2xl border border-[#30363d] bg-[#161b22]/50 px-10 py-4 text-lg font-semibold transition-all duration-300 hover:border-blue-500/50 hover:bg-[#161b22]"
						>
							Watch Demo
						</button>
					</div>
				</div>

				<!-- Premium Auth Card -->
				<div class="w-full max-w-md lg:w-1/2">
					<div
						class="glass rounded-3xl border border-[#30363d]/60 bg-[#0f1419]/90 p-10 shadow-2xl backdrop-blur-xl transition-all duration-500 hover:shadow-[#0d1117]/50"
					>
						<div class="mb-10 text-center">
							<div
								class="mx-auto mb-6 flex h-20 w-20 items-center justify-center rounded-2xl bg-gradient-to-r from-blue-500 to-purple-600 shadow-2xl"
							>
								<svg class="h-10 w-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
									<path
										stroke-linecap="round"
										stroke-linejoin="round"
										stroke-width="1.5"
										d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"
									/>
								</svg>
							</div>
							<h2 class="mb-3 text-3xl font-black text-white">Sign In to NeuroHub</h2>
							<p class="text-sm text-[#8b949e]">Connect with your dev account</p>
						</div>

						<!-- Email/Password -->
						<form id="authForm" class="mb-8 space-y-6">
							<div>
								<label class="mb-3 block text-sm font-semibold text-[#b0b7bc]">Email address</label>
								<input
									type="email"
									id="email"
									required
									class="w-full rounded-2xl border border-[#30363d] bg-[#161b22] px-5 py-4 text-lg text-white placeholder-[#8b949e] transition-all duration-300 focus:border-blue-500/50 focus:ring-3 focus:ring-blue-500/30 focus:outline-none"
									placeholder="me@example.com"
								/>
							</div>
							<div>
								<label class="mb-3 block text-sm font-semibold text-[#b0b7bc]">Password</label>
								<input
									type="password"
									id="password"
									required
									class="w-full rounded-2xl border border-[#30363d] bg-[#161b22] px-5 py-4 text-lg text-white placeholder-[#8b949e] transition-all duration-300 focus:border-blue-500/50 focus:ring-3 focus:ring-blue-500/30 focus:outline-none"
									placeholder="••••••••"
								/>
							</div>
							<button
								type="submit"
								id="submitBtn"
								class="w-full rounded-2xl bg-gradient-to-r from-blue-600 to-indigo-600 px-8 py-5 text-xl font-bold text-white shadow-xl transition-all duration-300 hover:scale-[1.02] hover:from-blue-700 hover:to-indigo-700 hover:shadow-blue-500/50"
							>
								Continue
							</button>
						</form>

						<!-- Divider -->
						<div class="relative mb-8 text-center text-xs text-[#8b949e] uppercase">
							<div class="absolute inset-0 flex items-center">
								<div class="h-px w-full bg-[#30363d]"></div>
							</div>
							<span class="relative bg-[#0f1419]/90 px-4">or</span>
						</div>

						<!-- OAuth - X/Twitter & GitHub Style -->
						<div class="space-y-4">
							<button
								type="button"
								class="group flex w-full items-center justify-center gap-4 rounded-2xl border border-[#30363d] bg-[#161b22] px-6 py-4 text-white transition-all duration-300 hover:border-blue-500/50 hover:bg-[#1a1f28]"
							>
								<svg
									class="h-6 w-6 text-blue-400 transition-transform group-hover:scale-110"
									viewBox="0 0 24 24"
									fill="currentColor"
								>
									<path
										d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.3L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"
									/>
								</svg>
								Continue with X
							</button>
							<button
								type="button"
								class="group flex w-full items-center justify-center gap-4 rounded-2xl border border-[#30363d] bg-[#161b22] px-6 py-4 text-white transition-all duration-300 hover:border-green-500/50 hover:bg-[#1a1f28]"
							>
								<svg
									class="h-6 w-6 text-green-500 transition-transform group-hover:scale-110"
									viewBox="0 0 24 24"
									fill="currentColor"
								>
									<path
										d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.185 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.675.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"
									/>
								</svg>
								Continue with GitHub
							</button>
						</div>

						<p class="mt-10 border-t border-[#30363d]/50 pt-8 text-center text-xs text-[#8b949e]">
							<span>By signing in, you agree to our </span>
							<a href="#" class="font-semibold text-blue-400 hover:underline">Terms</a>
							<span> and </span>
							<a href="#" class="font-semibold text-blue-400 hover:underline">Privacy Policy</a>.
						</p>
					</div>
				</div>
			</div>
		</div>

		<script>
			// Advanced Particle System
			const canvas = document.getElementById('particles');
			const ctx = canvas.getContext('2d');
			canvas.width = window.innerWidth;
			canvas.height = window.innerHeight;

			const particles = [];
			for (let i = 0; i < 50; i++) {
				particles.push({
					x: Math.random() * canvas.width,
					y: Math.random() * canvas.height,
					vx: (Math.random() - 0.5) * 0.5,
					vy: (Math.random() - 0.5) * 0.5,
					radius: Math.random() * 2 + 0.5,
					alpha: Math.random() * 0.5 + 0.2
				});
			}

			function animate() {
				ctx.clearRect(0, 0, canvas.width, canvas.height);
				particles.forEach((p) => {
					ctx.save();
					ctx.globalAlpha = p.alpha;
					ctx.fillStyle = '#1d9bf0';
					ctx.beginPath();
					ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
					ctx.fill();
					p.x += p.vx;
					p.y += p.vy;
					if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
					if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
					ctx.restore();
				});
				requestAnimationFrame(animate);
			}
			animate();

			window.addEventListener('resize', () => {
				canvas.width = window.innerWidth;
				canvas.height = window.innerHeight;
			});

			// Form Logic (Supabase ready)
			document.getElementById('authForm').addEventListener('submit', async (e) => {
				e.preventDefault();
				const btn = document.getElementById('submitBtn');
				const original = btn.innerHTML;
				btn.innerHTML =
					'<span class="w-6 h-6 border-2 border-white/30 border-t-white rounded-full animate-spin mx-auto"></span>';
				btn.disabled = true;

				// Simulate Supabase auth
				await new Promise((r) => setTimeout(r, 1500));
				window.location.href = '/dashboard';
			});
		</script>
	</body>
</html>
